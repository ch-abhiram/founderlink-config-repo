spring.cloud.gateway.routes[10].predicates[0]=Path=/startups/**
spring.cloud.gateway.routes[11].id=investment-service
spring.cloud.gateway.routes[11].uri=lb://INVESTMENT-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/investments/**
spring.cloud.gateway.routes[12].id=team-service
spring.cloud.gateway.routes[12].uri=lb://TEAM-SERVICE
spring.cloud.gateway.routes[12].predicates[0]=Path=/team/**,/teams/**
