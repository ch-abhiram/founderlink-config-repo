server.port=8083
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.health.redis.enabled=false
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [trace=%X{traceId:-},span=%X{spanId:-}] %-5level %logger{36} - %msg%n
spring.cloud.gateway.routes[0].id=auth-service-docs
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/v3/api-docs,/auth/v3/api-docs/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/auth/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}
spring.cloud.gateway.routes[1].id=user-service-docs
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/v3/api-docs,/users/v3/api-docs/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/users/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}
spring.cloud.gateway.routes[2].id=startup-service-docs
spring.cloud.gateway.routes[2].uri=lb://STARTUP-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/startups/v3/api-docs,/startups/v3/api-docs/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/startups/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}
spring.cloud.gateway.routes[3].id=investment-service-docs
spring.cloud.gateway.routes[3].uri=lb://INVESTMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/investments/v3/api-docs,/investments/v3/api-docs/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/investments/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}
spring.cloud.gateway.routes[4].id=team-service-docs
spring.cloud.gateway.routes[4].uri=lb://TEAM-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/team/v3/api-docs,/team/v3/api-docs/**,/teams/v3/api-docs,/teams/v3/api-docs/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/(team|teams)/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}
spring.cloud.gateway.routes[5].id=messaging-service-docs
spring.cloud.gateway.routes[5].uri=lb://MESSAGING-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/messages/v3/api-docs,/messages/v3/api-docs/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/messages/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}
spring.cloud.gateway.routes[6].id=notification-service-docs
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/v3/api-docs,/notifications/v3/api-docs/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/notifications/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}
spring.cloud.gateway.routes[7].id=auth-service
spring.cloud.gateway.routes[7].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[8].id=user-service
spring.cloud.gateway.routes[8].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[9].id=admin-service
spring.cloud.gateway.routes[9].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/admin/**
spring.cloud.gateway.routes[10].id=startup-service
